<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aa'In Contact</title>
<link rel="stylesheet" href="../css/contact.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <img src="../assets/logo.png" alt="Aa'In" class="brand-logo">
    <span class="brand-name">Aa'In</span>
  </div>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="collections.html" class="nav-link">Collections</a>
    <a href="reviews.html" class="nav-link">Reviews</a>
    <a href="contact.html" class="nav-link">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Contact Aa'In</h2>
  </div>
</section>

<main class="container">
  <form class="contact-form">
    <h3>Get in Touch</h3>
    <label>Name</label>
    <input type="text" id="name" placeholder="Your Name" required>
    <label>Email</label>
    <input type="email" id="email" placeholder="Your Email" required>
    <label>Message</label>
    <textarea id="message" rows="6" placeholder="Your Message" required></textarea>
    <button type="submit" class="btn submit-btn">Send Message</button>
  </form>
</main>

<div class="toast"></div>

<script src="../js/contact.js"></script>
</body>
</html>
